<!--
  dashboard.html — DISPLAY LAYER

  Reads ONLY computed_data.json. Never reads garmin_data.json or
  manual_log.json directly, and never recalculates anything.
  If a number here is wrong, the bug is in build_computed.py, not here.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E5E5E3;
    --text-primary: #1A1A1A;
    --text-secondary: #4A4A4A;
    --text-muted: #6B7280;
    --yellow: #F5C518;
    --yellow-text: #A88400;
    --blue: #2C6CB0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 1.5rem;
  }
  .header { margin-bottom: 1.25rem; }
  .header .eyebrow { font-size: 13px; color: var(--text-muted); margin: 0; }
  .header h1 { font-size: 22px; font-weight: 500; margin: 4px 0 0; }
  .header .sub { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0; }

  .summary-strip {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 1.25rem 0;
    font-size: 14px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-strip .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--yellow); flex-shrink: 0;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--surface);
    border-radius: 8px;
    padding: 1rem;
    border: 1px solid var(--border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card .label { font-size: 13px; color: var(--text-muted); margin: 0 0 4px; }
  .card .value { font-size: 24px; font-weight: 500; margin: 0; }
  .card .delta { font-size: 12px; margin: 4px 0 0; }
  .delta.up { color: var(--yellow-text); }
  .delta.down { color: var(--blue); }
  .delta.flat { color: var(--text-muted); }

  .chart-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .chart-card .title { font-size: 13px; color: var(--text-muted); margin: 0 0 12px; }
  .chart-wrap { position: relative; height: 220px; }

  .error {
    background: #FDF0F0;
    border: 1px solid #E5A0A0;
    color: #A83232;
    padding: 1rem;
    border-radius: 8px;
    font-size: 14px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active {
    color: var(--text-primary);
    border-bottom-color: var(--blue);
  }
  .tab-panel { display: none; }
</style>
</head>
<body>

  <div class="header">
    <p class="eyebrow">Garmin + Open-Meteo</p>
    <h1>Coaching dashboard</h1>
    <p class="sub" id="dateLabel">Loading...</p>
  </div>

  <div style="display:flex; gap:16px; margin-bottom:1.25rem;">
    <a href="manual_log_editor.html" style="font-size:13px; color:var(--blue); text-decoration:none;">Edit session log</a>
    <a href="training_plan_editor.html" style="font-size:13px; color:var(--blue); text-decoration:none;">Edit training plan</a>
    <a href="races_editor.html" style="font-size:13px; color:var(--blue); text-decoration:none;">Edit race results</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="acwr">ACWR</button>
    <button class="tab-btn" data-tab="plan">Plan</button>
    <button class="tab-btn" data-tab="performance">Performance</button>
    <button class="tab-btn" data-tab="predictor">Predictor</button>
    <button class="tab-btn" data-tab="races">Races</button>
  </div>

  <div id="content">
    <p class="error" style="display:none;" id="errorBox"></p>
  </div>

  <div id="tab-acwr" class="tab-panel" style="display:none;"></div>
  <div id="tab-plan" class="tab-panel" style="display:none;"></div>
  <div id="tab-performance" class="tab-panel" style="display:none;"></div>
  <div id="tab-predictor" class="tab-panel" style="display:none;"></div>
  <div id="tab-races" class="tab-panel" style="display:none;"></div>

<script>
async function loadDashboard() {
  const content = document.getElementById('content');
  const errorBox = document.getElementById('errorBox');

  let data;
  try {
    const res = await fetch('computed_data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (err) {
    errorBox.style.display = 'block';
    errorBox.textContent = 'Could not load computed_data.json: ' + err.message;
    return;
  }

  if (!Array.isArray(data) || data.length === 0) {
    errorBox.style.display = 'block';
    errorBox.textContent = 'computed_data.json loaded but contained no rows.';
    return;
  }

  data.sort((a, b) => a.date.localeCompare(b.date));
  const today = data[data.length - 1];

  document.getElementById('dateLabel').textContent = today.date;

  function deltaClass(delta) {
    if (delta === null || delta === undefined) return 'flat';
    if (delta > 0.5) return 'up';
    if (delta < -0.5) return 'down';
    return 'flat';
  }
  function fmtDelta(delta, unit) {
    if (delta === null || delta === undefined) return '';
    const sign = delta > 0 ? '+' : '';
    return `${sign}${delta}${unit} vs 7d avg`;
  }

  content.innerHTML = `
    <div class="summary-strip">
      <span class="dot"></span>
      <span>${today.today_summary || 'No summary available.'}</span>
    </div>

    <div class="card-grid">
      <div class="card">
        <p class="label">RHR</p>
        <p class="value">${today.rhr ?? '--'}</p>
        <p class="delta ${deltaClass(today.rhr_delta_from_baseline)}">${fmtDelta(today.rhr_delta_from_baseline, ' bpm')}</p>
      </div>
      <div class="card">
        <p class="label">HRV</p>
        <p class="value">${today.hrv_last_night ?? '--'}</p>
        <p class="delta ${deltaClass(today.hrv_delta_from_baseline)}">${fmtDelta(today.hrv_delta_from_baseline, ' ms')}</p>
      </div>
      <div class="card">
        <p class="label">Sleep score</p>
        <p class="value">${today.sleep_score ?? '--'}</p>
      </div>
      <div class="card">
        <p class="label">Body battery</p>
        <p class="value">${today.body_battery_high ?? '--'}</p>
      </div>
      <div class="card">
        <p class="label">ACWR</p>
        <p class="value">${today.acwr ?? '--'}</p>
      </div>
      <div class="card">
        <p class="label">Heat risk today</p>
        <p class="value" style="text-transform:capitalize;">${today.heat_risk ?? 'n/a'}</p>
      </div>
    </div>

    <div class="chart-card">
      <p class="title">HRV &amp; RHR trend</p>
      <div class="chart-wrap"><canvas id="hrvRhrChart"></canvas></div>
    </div>

    <div class="chart-card">
      <p class="title">Sleep score &amp; body battery</p>
      <div class="chart-wrap"><canvas id="sleepBbChart"></canvas></div>
    </div>

    <div class="chart-card">
      <p class="title">Achilles score (0 = no issue, 10 = severe)</p>
      <div class="chart-wrap"><canvas id="achillesChart"></canvas></div>
    </div>

    <div class="chart-card" id="planCard" style="display:none;">
      <p class="title">Upcoming sessions</p>
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr style="text-align:left; color:var(--text-muted);">
            <th style="padding:6px 8px;">Date</th><th style="padding:6px 8px;">Type</th>
            <th style="padding:6px 8px;">Distance</th><th style="padding:6px 8px;">Pace</th>
          </tr>
        </thead>
        <tbody id="planRows"></tbody>
      </table>
    </div>
  `;

  const labels = data.map(r => r.date.slice(5));

  new Chart(document.getElementById('hrvRhrChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'HRV (ms)',
          data: data.map(r => r.hrv_last_night),
          borderColor: '#D4A800',
          backgroundColor: '#D4A800',
          tension: 0.3,
          spanGaps: true,
        },
        {
          label: 'RHR (bpm)',
          data: data.map(r => r.rhr),
          borderColor: '#2C6CB0',
          backgroundColor: '#2C6CB0',
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { position: 'left', ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
        y1: { position: 'right', ticks: { color: '#6B7280' }, grid: { display: false } },
        x: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
      },
      plugins: { legend: { labels: { color: '#1A1A1A' } } },
    },
  });

  new Chart(document.getElementById('sleepBbChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Sleep score',
          data: data.map(r => r.sleep_score),
          borderColor: '#2C6CB0',
          backgroundColor: '#2C6CB0',
          tension: 0.3,
          spanGaps: true,
        },
        {
          label: 'Body battery',
          data: data.map(r => r.body_battery_high),
          borderColor: '#D4A800',
          backgroundColor: '#D4A800',
          tension: 0.3,
          spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
        x: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
      },
      plugins: { legend: { labels: { color: '#1A1A1A' } } },
    },
  });

  new Chart(document.getElementById('achillesChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Achilles (0-10)',
          data: data.map(r => r.achilles_score),
          borderColor: '#D4A800',
          backgroundColor: '#D4A800',
          tension: 0.2,
          spanGaps: true,
          pointRadius: 4,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 10,
          ticks: { color: '#6B7280', stepSize: 1 },
          grid: { color: '#E5E5E3' },
        },
        x: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
      },
      plugins: {
        legend: { display: false },
        annotation: undefined,
      },
    },
  });

  setupTabs(data);
  return data;
}

function setupTabs(data) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      document.getElementById('content').style.display = 'none';

      btn.classList.add('active');
      const tab = btn.dataset.tab;
      if (tab === 'overview') {
        document.getElementById('content').style.display = 'block';
      } else {
        document.getElementById('tab-' + tab).style.display = 'block';
      }
    });
  });

  buildAcwrTab(data);
  buildPlanTab(data);
  buildPerformanceTab(data);
  buildPredictorTab();
  buildRacesTab();
}

function buildAcwrTab(data) {
  const panel = document.getElementById('tab-acwr');
  const today = data[data.length - 1];
  const statusColor = { LOW: 'var(--blue)', OPTIMAL: '#2E7D32', HIGH: 'var(--yellow-text)', undefined: 'var(--text-muted)' };

  panel.innerHTML = `
    <div class="card-grid">
      <div class="card">
        <p class="label">Current ACWR</p>
        <p class="value">${today.acwr ?? '--'}</p>
      </div>
      <div class="card">
        <p class="label">Status</p>
        <p class="value" style="font-size:18px; color:${statusColor[today.acwr_status] || 'var(--text-muted)'};">${today.acwr_status ?? 'n/a'}</p>
      </div>
    </div>
    <div class="chart-card">
      <p class="title">ACWR trend (0.8-1.3 typically considered safe range)</p>
      <div class="chart-wrap"><canvas id="acwrChart"></canvas></div>
    </div>
  `;

  const labels = data.map(r => r.date.slice(5));
  new Chart(document.getElementById('acwrChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'ACWR',
          data: data.map(r => r.acwr),
          borderColor: '#D4A800',
          backgroundColor: '#D4A800',
          tension: 0.3,
          spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
        x: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
      },
      plugins: { legend: { display: false } },
    },
  });
}

loadDashboard().then(loadTrainingPlan);

function toDateStr(d) {
  // Always use LOCAL date components, never toISOString() — that
  // converts to UTC and silently shifts dates back a day whenever
  // the local timezone is ahead of UTC (e.g. UK on BST).
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day; // shift to Monday
  d.setDate(d.getDate() + diff);
  return toDateStr(d);
}

function fmtWeekLabel(weekStartStr) {
  const start = new Date(weekStartStr + 'T00:00:00');
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `Week of ${fmt(start)} - ${fmt(end)}`;
}

async function buildPlanTab(computedData) {
  const panel = document.getElementById('tab-plan');
  const today = computedData[computedData.length - 1];

  let plan = [];
  let flagsLog = [];
  try {
    const res = await fetch('training_plan.json?v=' + Date.now());
    if (res.ok) plan = await res.json();
  } catch (e) { /* no plan yet */ }
  try {
    const res = await fetch('flags_log.json?v=' + Date.now());
    if (res.ok) flagsLog = await res.json();
  } catch (e) { /* no flags yet */ }

  const planByDate = {};
  plan.forEach(s => { planByDate[s.date] = s; });

  let html = '';

  if (today.plan_flag_reasons && today.plan_flag_reasons.length) {
    html += `
      <div style="background:#FFF4E5; border:1px solid #F0C674; border-radius:8px; padding:12px 16px; margin-bottom:1.5rem;">
        <p style="font-size:13px; font-weight:500; color:#7A5200; margin:0 0 6px;">Worth reviewing today</p>
        ${today.plan_flag_reasons.map(r => `<p style="font-size:13px; color:#7A5200; margin:2px 0;">• ${r}</p>`).join('')}
      </div>
    `;
  }

  // Build full 7-day weeks: this week + next 2 weeks, showing every day
  // (with or without a planned session), not just days that have entries.
  const todayWeekStart = getWeekStart(today.date);
  const weekStarts = [0, 1, 2].map(offset => {
    const d = new Date(todayWeekStart + 'T00:00:00');
    d.setDate(d.getDate() + offset * 7);
    return toDateStr(d);
  });

  weekStarts.forEach(weekStart => {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart + 'T00:00:00');
      d.setDate(d.getDate() + i);
      days.push(toDateStr(d));
    }

    html += `
      <div class="chart-card">
        <p class="title">${fmtWeekLabel(weekStart)}</p>
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead>
            <tr style="text-align:left; color:var(--text-muted);">
              <th style="padding:6px 8px;">Date</th><th style="padding:6px 8px;">Type</th>
              <th style="padding:6px 8px;">Distance</th><th style="padding:6px 8px;">Pace</th>
              <th style="padding:6px 8px;">Notes</th>
            </tr>
          </thead>
          <tbody>
            ${days.map(dateStr => {
              const s = planByDate[dateStr];
              const isToday = dateStr === today.date;
              const dayName = new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'short' });
              return `
                <tr style="border-top:1px solid var(--border); ${isToday ? 'background:#FFFBEF;' : ''}">
                  <td style="padding:6px 8px;">${dayName} ${dateStr.slice(5)}${isToday ? ' (today)' : ''}</td>
                  <td style="padding:6px 8px; text-transform:capitalize; ${!s ? 'color:var(--text-muted);' : ''}">${s ? s.session_type : 'Nothing planned'}</td>
                  <td style="padding:6px 8px;">${s && s.target_distance_km ? s.target_distance_km + ' km' : '--'}</td>
                  <td style="padding:6px 8px;">${s && s.target_pace ? s.target_pace : '--'}</td>
                  <td style="padding:6px 8px; color:var(--text-secondary);">${s && s.notes ? s.notes : ''}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  });

  // Flag history — only past events, most recent first
  if (flagsLog.length) {
    const sorted = [...flagsLog].sort((a, b) => b.date.localeCompare(a.date));
    html += `
      <div class="chart-card">
        <p class="title">Flag history</p>
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead>
            <tr style="text-align:left; color:var(--text-muted);">
              <th style="padding:6px 8px;">Date</th><th style="padding:6px 8px;">Planned</th><th style="padding:6px 8px;">Reasons</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(f => `
              <tr style="border-top:1px solid var(--border);">
                <td style="padding:6px 8px;">${f.date}</td>
                <td style="padding:6px 8px; text-transform:capitalize;">${f.planned_session ?? '--'}</td>
                <td style="padding:6px 8px; color:var(--text-secondary);">${f.reasons.join(' ')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  panel.innerHTML = html;
}

async function buildPredictorTab() {
  const panel = document.getElementById('tab-predictor');
  let pred;
  try {
    const res = await fetch('race_prediction.json?v=' + Date.now());
    if (!res.ok) throw new Error('not found');
    pred = await res.json();
  } catch (e) {
    panel.innerHTML = '<p class="error">race_prediction.json not found — run race_predictor.py first.</p>';
    return;
  }

  const r = pred.riegel_estimate;
  const daysToRace = Math.ceil((new Date(pred.race_date) - new Date(pred.generated_date)) / 86400000);

  panel.innerHTML = `
    <div class="card-grid">
      <div class="card">
        <p class="label">${pred.race_name}</p>
        <p class="value">${r.predicted_time_fmt ?? '--'}</p>
        <p class="delta flat">Riegel estimate</p>
      </div>
      <div class="card">
        <p class="label">Range</p>
        <p class="value" style="font-size:18px;">${r.low_estimate_fmt ?? '--'} - ${r.high_estimate_fmt ?? '--'}</p>
      </div>
      <div class="card">
        <p class="label">Days to race</p>
        <p class="value">${daysToRace}</p>
      </div>
    </div>
    <div class="chart-card">
      <p class="title">Basis</p>
      <p style="font-size:13px; color:var(--text-secondary); margin:0 0 10px;">${r.note}</p>
      <p style="font-size:13px; color:var(--text-secondary); margin:0 0 10px; border-top:1px solid var(--border); padding-top:10px;">${pred.vo2max_note}</p>
      ${pred.recent_key_sessions && pred.recent_key_sessions.length ? `
        <p style="font-size:13px; color:var(--text-muted); margin:10px 0 4px; border-top:1px solid var(--border); padding-top:10px;">
          Recent key sessions (for reference — not converted into a predicted time):
        </p>
        ${pred.recent_key_sessions.map(s => `
          <p style="font-size:13px; color:var(--text-secondary); margin:2px 0;">${s.date}: ${s.description}</p>
        `).join('')}
        <p style="font-size:12px; color:var(--text-muted); margin:8px 0 0;">${pred.key_sessions_note}</p>
      ` : ''}
    </div>
  `;
}

function buildPerformanceTab(data) {
  const panel = document.getElementById('tab-performance');
  const today = data[data.length - 1];
  const vo2Rows = data.filter(r => r.vo2max);
  const latestVo2 = vo2Rows.length ? vo2Rows[vo2Rows.length - 1] : null;

  panel.innerHTML = `
    <div class="card-grid">
      <div class="card">
        <p class="label">VO2max</p>
        <p class="value">${latestVo2 ? latestVo2.vo2max : '--'}</p>
        <p class="delta flat">${latestVo2 ? 'as of ' + latestVo2.vo2max_date : 'no data yet'}</p>
      </div>
      <div class="card">
        <p class="label">Training status</p>
        <p class="value" style="font-size:16px; text-transform:capitalize;">${(today.training_status_feedback || 'n/a').toLowerCase().replace(/_/g, ' ')}</p>
      </div>
    </div>
    <div class="chart-card">
      <p class="title">VO2max trend</p>
      <div class="chart-wrap"><canvas id="vo2Chart"></canvas></div>
    </div>
  `;

  if (vo2Rows.length < 2) {
    document.querySelector('#tab-performance .chart-wrap').innerHTML =
      '<p style="color:var(--text-muted); font-size:13px; padding-top:2rem; text-align:center;">Not enough VO2max readings yet to plot a trend — Garmin updates this every few days, not daily.</p>';
    return;
  }

  new Chart(document.getElementById('vo2Chart'), {
    type: 'line',
    data: {
      labels: vo2Rows.map(r => r.date.slice(5)),
      datasets: [{
        label: 'VO2max',
        data: vo2Rows.map(r => r.vo2max),
        borderColor: '#D4A800',
        backgroundColor: '#D4A800',
        tension: 0.3,
        pointRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
        x: { ticks: { color: '#6B7280' }, grid: { color: '#E5E5E3' } },
      },
      plugins: { legend: { display: false } },
    },
  });
}

async function buildRacesTab() {
  const panel = document.getElementById('tab-races');
  let races = [];
  try {
    const res = await fetch('races.json?v=' + Date.now());
    if (res.ok) races = await res.json();
  } catch (e) {
    panel.innerHTML = '<p class="error">Could not load races.json</p>';
    return;
  }

  races.sort((a, b) => b.date.localeCompare(a.date));

  panel.innerHTML = `
    <div class="chart-card">
      <p class="title">Race history</p>
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr style="text-align:left; color:var(--text-muted);">
            <th style="padding:6px 8px;">Date</th>
            <th style="padding:6px 8px;">Race</th>
            <th style="padding:6px 8px;">Distance</th>
            <th style="padding:6px 8px;">Time</th>
            <th style="padding:6px 8px;">Tapered</th>
            <th style="padding:6px 8px;">Notes</th>
          </tr>
        </thead>
        <tbody>
          ${races.map(r => `
            <tr style="border-top:1px solid var(--border);">
              <td style="padding:6px 8px;">${r.date}</td>
              <td style="padding:6px 8px;">${r.name}</td>
              <td style="padding:6px 8px;">${r.distance_km ?? '--'} km</td>
              <td style="padding:6px 8px;">${r.time_fmt ?? '--'}</td>
              <td style="padding:6px 8px;">${r.tapered ? 'Yes' : 'No'}</td>
              <td style="padding:6px 8px; color:var(--text-secondary);">${r.notes ?? ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function loadTrainingPlan() {
  try {
    const res = await fetch('training_plan.json?v=' + Date.now());
    if (!res.ok) return;
    const plan = await res.json();
    const today = new Date().toISOString().slice(0, 10);
    const upcoming = plan.filter(s => s.date >= today).sort((a, b) => a.date.localeCompare(b.date));
    if (upcoming.length === 0) return;

    document.getElementById('planCard').style.display = 'block';
    document.getElementById('planRows').innerHTML = upcoming.map(s => `
      <tr style="border-top:1px solid var(--border);">
        <td style="padding:6px 8px;">${s.date}</td>
        <td style="padding:6px 8px; text-transform:capitalize;">${s.session_type}</td>
        <td style="padding:6px 8px;">${s.target_distance_km ?? '--'} km</td>
        <td style="padding:6px 8px;">${s.target_pace ?? '--'}</td>
      </tr>
    `).join('');
  } catch (e) {
    // no plan file yet, leave hidden
  }
}
</script>
